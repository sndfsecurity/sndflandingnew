<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <style>
        body {
            margin: 0;
            padding: 0;
             background: #0b2c4d;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .main-text {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .sub-text {
            font-size: 16px;
            color: #cbd5e1;
        }

        .btn {
            margin-top: 25px;
            display: inline-block;
            padding: 12px 25px;
           background: linear-gradient(135deg, #f59e0b, #ffb703);
            color: #000;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
        }

       

        /* 📱 Mobile Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
            }

            .main-text {
                font-size: 18px;
            }

            .sub-text {
                font-size: 14px;
            }

            .btn {
                font-size: 14px;
                padding: 10px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Thank You!</h1>
        <p class="main-text">Your request has been submitted successfully.</p>
        <p class="sub-text">Our team will contact you shortly.</p>
        <p style="margin-top:20px; color:#9ca3af;">
            SNDF Guard Security
        </p>

        <a href="/" class="btn">Back to Home</a>

       

    </div>

</body>
</html>
